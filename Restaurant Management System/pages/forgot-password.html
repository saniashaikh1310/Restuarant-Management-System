<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forgot password — Nexus Bite</title>
    <link rel="stylesheet" href="../style.css" />
  </head>
  <body>
    <header class="rms-nav scrolled">
      <div class="rms-nav-inner">
        <a href="../index.html" class="rms-logo"><span class="rms-logo-mark">◆</span> Nexus Bite</a>
        <div class="rms-nav-overlay"></div>
        <nav class="rms-nav-links">
          <a href="login.html">Login</a>
        </nav>
        <div class="rms-nav-actions">
          <button type="button" class="rms-btn-icon" data-theme-toggle title="Toggle theme">☾</button>
          <button type="button" class="rms-burger" data-nav-toggle aria-label="Menu"><span></span><span></span><span></span></button>
        </div>
      </div>
    </header>

    <section class="rms-page-hero">
      <div class="rms-wrap" style="max-width: 460px; margin: 0 auto; padding-bottom: 4rem">
        <div class="rms-glass-strong" style="padding: 2rem; border-radius: var(--radius-xl)">
          <h1 style="margin-top: 0; font-family: var(--font-display)">Reset access</h1>
          <p style="color: var(--text-muted)">UI-only flow — wire your C++ mailer module for viva depth.</p>
          <form
            onsubmit="event.preventDefault(); NexusBite.toast('Reset link sent (demo)','success'); setTimeout(function(){location.href='otp.html'},500);"
          >
            <div class="rms-field">
              <label for="email">Email</label>
              <input class="rms-input" id="email" type="email" required />
            </div>
            <button type="submit" class="rms-btn rms-btn-primary" style="width: 100%; margin-top: 0.5rem; padding: 0.9rem">Send reset link</button>
          </form>
          <p class="rms-center rms-mt"><a href="login.html" style="color: var(--accent); font-weight: 600">← Back to login</a></p>
        </div>
      </div>
    </section>
    <script src="../script.js"></script>
  </body>
</html>
