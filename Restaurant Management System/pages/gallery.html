<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gallery — Nexus Bite</title>
    <link rel="stylesheet" href="https://unpkg.com/aos@2.3.4/dist/aos.css" />
    <link rel="stylesheet" href="../style.css" />
  </head>
  <body>
    <header class="rms-nav scrolled">
      <div class="rms-nav-inner">
        <a href="../index.html" class="rms-logo"><span class="rms-logo-mark">◆</span> Nexus Bite</a>
        <div class="rms-nav-overlay"></div>
        <nav class="rms-nav-links">
          <a href="../index.html">Home</a>
          <a class="active" href="gallery.html">Gallery</a>
          <a href="menu.html">Menu</a>
        </nav>
        <div class="rms-nav-actions">
          <button type="button" class="rms-btn-icon" data-theme-toggle title="Toggle theme">☾</button>
          <button type="button" class="rms-burger" data-nav-toggle aria-label="Menu"><span></span><span></span><span></span></button>
        </div>
      </div>
    </header>

    <section class="rms-page-hero">
      <div class="rms-wrap">
        <div class="rms-section-head" data-aos="fade-up">
          <div class="rms-kicker">Visual menu</div>
          <h1 class="rms-title">Food gallery</h1>
          <p class="rms-sub">Parallax-ready cards with cinematic photography.</p>
        </div>
        <div class="rms-grid-cards">
          <div class="rms-food-card" data-aos="zoom-in"><div class="thumb"><img src="https://images.unsplash.com/photo-1504674900240-87c30813f79d?w=700&q=80" alt="" /></div><div class="body"><h3 class="rms-food-title">Chef’s table</h3></div></div>
          <div class="rms-food-card" data-aos="zoom-in" data-aos-delay="60"><div class="thumb"><img src="https://images.unsplash.com/photo-1540189549336-e6e99c3679fe?w=700&q=80" alt="" /></div><div class="body"><h3 class="rms-food-title">Bowls &amp; greens</h3></div></div>
          <div class="rms-food-card" data-aos="zoom-in" data-aos-delay="120"><div class="thumb"><img src="https://images.unsplash.com/photo-1555939594-58d7cb561ad1?w=700&q=80" alt="" /></div><div class="body"><h3 class="rms-food-title">Grill marks</h3></div></div>
          <div class="rms-food-card" data-aos="zoom-in"><div class="thumb"><img src="https://images.unsplash.com/photo-1473093295043-cdd812d0e601?w=700&q=80" alt="" /></div><div class="body"><h3 class="rms-food-title">Pasta glow</h3></div></div>
          <div class="rms-food-card" data-aos="zoom-in" data-aos-delay="60"><div class="thumb"><img src="https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?w=700&q=80" alt="" /></div><div class="body"><h3 class="rms-food-title">Ambience</h3></div></div>
          <div class="rms-food-card" data-aos="zoom-in" data-aos-delay="120"><div class="thumb"><img src="https://images.unsplash.com/photo-1559339352-11d035aa65de?w=700&q=80" alt="" /></div><div class="body"><h3 class="rms-food-title">Neon nights</h3></div></div>
        </div>
      </div>
    </section>
    <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
    <script src="../script.js"></script>
    <script>AOS.init({ duration: 800, once: true });</script>
