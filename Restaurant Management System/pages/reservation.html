<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reservations — Nexus Bite</title>
    <link rel="stylesheet" href="https://unpkg.com/aos@2.3.4/dist/aos.css" />
    <link rel="stylesheet" href="../style.css" />
  </head>
  <body>
    <div class="rms-page-loader"><div class="rms-loader-plate"></div></div>
    <header class="rms-nav">
      <div class="rms-nav-inner">
        <a href="../index.html" class="rms-logo"><span class="rms-logo-mark">◆</span> Nexus Bite</a>
        <div class="rms-nav-overlay"></div>
        <nav class="rms-nav-links">
          <a href="../index.html">Home</a>
          <a href="menu.html">Menu</a>
          <a class="active" href="reservation.html">Reserve</a>
        </nav>
        <div class="rms-nav-actions">
          <button type="button" class="rms-btn-icon" data-theme-toggle title="Toggle theme">☾</button>
          <button type="button" class="rms-burger" data-nav-toggle aria-label="Menu"><span></span><span></span><span></span></button>
        </div>
      </div>
    </header>

    <section class="rms-page-hero">
      <div class="rms-wrap rms-split">
        <div class="rms-glass-strong" style="padding: 1.75rem" data-aos="fade-right">
          <h1 style="margin-top: 0; font-family: var(--font-display)">Book a table</h1>
          <p style="color: var(--text-muted)">Date, time, guests — stored locally as reservation history.</p>
          <form id="reservation-form" class="rms-mt">
            <div class="rms-field">
              <label>Name</label>
              <input class="rms-input" name="name" required />
            </div>
            <div class="rms-field">
              <label>Phone</label>
              <input class="rms-input" name="phone" required inputmode="tel" />
            </div>
            <div class="rms-flex">
              <div class="rms-field rms-grow">
                <label>Date</label>
                <input class="rms-input" name="date" type="date" required />
              </div>
              <div class="rms-field rms-grow">
                <label>Time</label>
                <input class="rms-input" name="time" type="time" required />
              </div>
            </div>
            <div class="rms-field">
              <label>Guests</label>
              <select class="rms-select" name="guests" required>
                <option>2</option>
                <option>3</option>
                <option>4</option>
                <option>6</option>
                <option>8+</option>
              </select>
            </div>
            <button type="submit" class="rms-btn rms-btn-primary" style="width: 100%; padding: 0.95rem; margin-top: 0.5rem">Request table</button>
          </form>
        </div>
        <div class="rms-glass" style="padding: 1.5rem" data-aos="fade-left">
          <h3 style="margin-top: 0; font-family: var(--font-display)">Reservation history</h3>
          <div id="reservation-history"></div>
        </div>
      </div>
    </section>

    <div class="rms-modal" id="res-confirm" role="dialog" aria-modal="true">
      <div class="rms-modal-card rms-glass-strong">
        <div class="rms-success-check" style="margin-top: 0">✓</div>
        <h2 class="rms-center" style="font-family: var(--font-display); margin: 0 0 0.5rem">You’re on the list</h2>
        <p class="rms-center" style="color: var(--text-muted)">Confirmation SMS would fire from your C++ notification module.</p>
        <button type="button" class="rms-btn rms-btn-primary" style="width: 100%; margin-top: 1rem" data-close-modal>Awesome</button>
      </div>
    </div>

    <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
    <script src="../script.js"></script>
    <script>
      AOS.init({ duration: 700, once: true });
    </script>
  </body>
</html>
