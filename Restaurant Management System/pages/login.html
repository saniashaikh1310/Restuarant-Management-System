<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login — Nexus Bite</title>
    <link rel="stylesheet" href="https://unpkg.com/aos@2.3.4/dist/aos.css" />
    <link rel="stylesheet" href="../style.css" />
  </head>
  <body>
    <div class="rms-page-loader"><div class="rms-loader-plate"></div></div>
    <header class="rms-nav">
      <div class="rms-nav-inner">
        <a href="../index.html" class="rms-logo"><span class="rms-logo-mark">◆</span> Nexus Bite</a>
        <div class="rms-nav-overlay"></div>
        <nav class="rms-nav-links">
          <a href="../index.html">Home</a>
          <a href="menu.html">Menu</a>
          <a href="reservation.html">Reserve</a>
          <a class="active" href="login.html">Login</a>
        </nav>
        <div class="rms-nav-actions">
          <button type="button" class="rms-btn-icon" data-theme-toggle title="Toggle theme">☾</button>
          <a href="signup.html" class="rms-btn rms-btn-primary">Sign up</a>
          <button type="button" class="rms-burger" data-nav-toggle aria-label="Menu"><span></span><span></span><span></span></button>
        </div>
      </div>
    </header>

    <section class="rms-page-hero">
      <div class="rms-wrap rms-auth-layout">
        <div class="rms-glass rms-auth-panel decor" data-aos="fade-right" style="background: url(https://images.unsplash.com/photo-1414235077428-338989a2e8c0?w=900&q=80) center/cover">
          <div style="background: linear-gradient(180deg, transparent, rgba(0,0,0,.75)); padding: 1.5rem; border-radius: inherit">
            <h2 style="margin: 0 0 0.5rem; font-family: var(--font-display)">Welcome back</h2>
            <p style="margin: 0; color: #e2e8f0">Secure session UI with animated glass form.</p>
          </div>
        </div>
        <div class="rms-glass-strong rms-auth-panel" data-aos="fade-left">
          <h1 style="margin-top: 0; font-family: var(--font-display)">Sign in</h1>
          <form id="login-form">
            <div class="rms-field">
              <label for="email">Email</label>
              <input class="rms-input" id="email" name="email" type="email" required placeholder="you@example.com" />
            </div>
            <div class="rms-field">
              <label for="password">Password</label>
              <div class="rms-input-wrap">
                <input class="rms-input" id="password" name="password" type="password" required placeholder="••••••••" />
                <button type="button" class="rms-toggle-pass" data-toggle-pass="password" aria-label="Show password">👁</button>
              </div>
            </div>
            <div class="rms-flex" style="justify-content: space-between; align-items: center; margin-bottom: 1rem">
              <label class="rms-check"><input type="checkbox" name="remember" /> Remember me</label>
              <a href="forgot-password.html" style="color: var(--accent); font-size: 0.88rem; font-weight: 600">Forgot?</a>
            </div>
            <button type="submit" class="rms-btn rms-btn-primary" style="width: 100%; padding: 0.95rem">Continue</button>
            <p class="rms-center rms-mt" style="color: var(--text-muted)">New here? <a href="signup.html" style="color: var(--accent); font-weight: 600">Create account</a></p>
          </form>
        </div>
      </div>
    </section>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
    <script src="../script.js"></script>
    <script>
      AOS.init({ duration: 700, once: true });
      gsap.from(".rms-auth-panel", { y: 24, opacity: 0, stagger: 0.12, duration: 0.7, ease: "power3.out" });
    </script>
  </body>
</html>
